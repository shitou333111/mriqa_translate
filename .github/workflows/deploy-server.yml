name: Deploy To Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-server:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build
        run: npm run build
        env:
          BASE_URL: /

      - name: Prepare deploy artifacts
        run: |
          cat > frontend/dist/404.html <<EOF
          <!doctype html>
          <html>
          <head>
          <meta charset="utf-8">
          <title>Redirecting...</title>
          <script>
          (function() {
            var basePath = "";
            var loc = window.location;
            var path = loc.pathname;
            if (basePath && path.indexOf(basePath) === 0) {
              path = path.slice(basePath.length);
            }
            if (!path.startsWith("/")) {
              path = "/" + path;
            }
            var query = loc.search ? loc.search.slice(1) : "";
            var target = (basePath || "") + "/?p=" + encodeURIComponent(path);
            if (query) {
              target += "&q=" + encodeURIComponent(query);
            }
            target += loc.hash || "";
            loc.replace(loc.protocol + "//" + loc.host + target);
          })();
          </script>
          </head>
          <body></body>
          </html>
          EOF

      - name: Upload dist to server tmp path
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: frontend/dist/*
          target: /tmp/mriqa_translate-deploy
          overwrite: true
          strip_components: 2

      - name: Upload server runtime files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: server/index.js,server/package.json,server/package-lock.json
          target: /tmp/mriqa_translate-server
          overwrite: true
          strip_components: 1

      - name: Atomic deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            TARGET_DIR="${{ secrets.SSH_TARGET_DIR }}"
            RELEASES_DIR="${TARGET_DIR}/.releases"
            RELEASE_DIR="${RELEASES_DIR}/release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            CURRENT_DIR="${TARGET_DIR}/current"

            mkdir -p "$RELEASE_DIR"
            cp -a /tmp/mriqa_translate-deploy/. "$RELEASE_DIR/"

            mkdir -p "$RELEASE_DIR/server"
            cp -a /tmp/mriqa_translate-server/. "$RELEASE_DIR/server/"

            # Keep server-side content for these folders unchanged across releases.
            for dir in en zh baseline uploads; do
              if [ -d "${CURRENT_DIR}/${dir}" ]; then
                rm -rf "${RELEASE_DIR:?}/${dir}"
                cp -a "${CURRENT_DIR}/${dir}" "${RELEASE_DIR}/${dir}"
              fi
            done

            ln -sfn "$RELEASE_DIR" "${TARGET_DIR}/current"

            cd "${TARGET_DIR}/current/server"
            npm ci --omit=dev

            if command -v pm2 >/dev/null 2>&1; then
              if pm2 describe mriqa-api >/dev/null 2>&1; then
                HOST=127.0.0.1 PORT=3001 pm2 restart mriqa-api --update-env
              else
                HOST=127.0.0.1 PORT=3001 pm2 start index.js --name mriqa-api
              fi
              pm2 save || true
            else
              pkill -f "node .*current/server/index.js" || true
              HOST=127.0.0.1 PORT=3001 nohup node "${TARGET_DIR}/current/server/index.js" > "${TARGET_DIR}/server.log" 2>&1 &
            fi

            ls -1dt "${RELEASES_DIR}"/release-* 2>/dev/null | tail -n +6 | xargs -r rm -rf
