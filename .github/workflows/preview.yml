name: Deploy Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Compute deploy meta
        id: meta
        run: |
          FIRST_LINE=$(git log -1 --pretty=%s)
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "preview_msg=preview(pr-${{ github.event.number }}): ${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          else
            echo "preview_msg=preview(latest): ${GITHUB_SHA::7} ${FIRST_LINE}" >> $GITHUB_OUTPUT
            echo "prod_msg=release: ${GITHUB_SHA::7} ${FIRST_LINE}" >> $GITHUB_OUTPUT
          fi

      - name: Build for preview
        if: github.event_name != 'workflow_dispatch'
        run: npm run build
        env:
          BASE_URL: ${{ github.event_name == 'pull_request' && format('/mriqa_translate/previews/pr-{0}/', github.event.number) || '/mriqa_translate/previews/latest/' }}

      - name: Copy static articles for preview
        if: github.event_name != 'workflow_dispatch'
        run: |
          mkdir -p frontend/dist/en frontend/dist/zh frontend/dist/baseline
          cp -a en/. frontend/dist/en/
          cp -a zh/. frontend/dist/zh/
          cp -a baseline/. frontend/dist/baseline/
          cp frontend/dist/index.html frontend/dist/404.html

      - name: Generate static route entries for preview
        if: github.event_name != 'workflow_dispatch'
        run: |
          for file in zh/*.html; do
            slug=$(basename "$file" .html)
            if [ "$slug" = "index" ]; then
              continue
            fi
            mkdir -p "frontend/dist/$slug"
            cp frontend/dist/index.html "frontend/dist/$slug/index.html"
          done

      - name: Deploy to preview
        if: github.event_name != 'workflow_dispatch'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend/dist
          target-folder: ${{ github.event_name == 'pull_request' && format('previews/pr-{0}', github.event.number) || 'previews/latest' }}
          clean: false
          commit-message: ${{ steps.meta.outputs.preview_msg }}
          force: false

      - name: Build for production
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
        run: npm run build
        env:
          BASE_URL: /mriqa_translate/

      - name: Copy static articles for production
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
        run: |
          mkdir -p frontend/dist/en frontend/dist/zh frontend/dist/baseline
          cp -a en/. frontend/dist/en/
          cp -a zh/. frontend/dist/zh/
          cp -a baseline/. frontend/dist/baseline/
          cp frontend/dist/index.html frontend/dist/404.html

      - name: Generate static route entries for production
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
        run: |
          for file in zh/*.html; do
            slug=$(basename "$file" .html)
            if [ "$slug" = "index" ]; then
              continue
            fi
            mkdir -p "frontend/dist/$slug"
            cp frontend/dist/index.html "frontend/dist/$slug/index.html"
          done

      - name: Deploy to production
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend/dist
          clean: false
          commit-message: ${{ steps.meta.outputs.prod_msg }}
          force: false
